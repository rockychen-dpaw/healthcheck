apiVersion: v1
kind: Service
metadata:
  name: healthcheck-clusterip
spec:
  type: ClusterIP
  ports:
    - name: wsgi
      port: 8080
      protocol: TCP
      targetPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: healthcheckserver-headless
spec:
  type: ClusterIP
  ports:
    - name: wsgi
      port: 9080
      protocol: TCP
      targetPort: 9080
